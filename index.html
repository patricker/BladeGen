<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- Favicons: using 256px square PNG; browsers downscale as needed -->
    <link rel="icon" type="image/png" sizes="32x32" href="/swordmaker_logo_256.png" />
    <link rel="icon" type="image/png" sizes="192x192" href="/swordmaker_logo_256.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/swordmaker_logo_256.png" />
    <title>SwordMaker — Parametric Sword Generator</title>
    <style>
      html, body, #app { height: 100%; margin: 0; }
      #app { display: grid; grid-template-rows: auto 1fr; }
      header { padding: 8px 12px; background: #121212; color: #ddd; font-family: system-ui, sans-serif; display:flex; justify-content:space-between; align-items:center; gap:12px; }
      header .brand { display:flex; align-items:center; gap:8px; }
      header .brand img.logo { display:block; height:26px; width:auto; }
      header .tag { opacity: 0.85; font-size: 12px; }
      header .right { display:flex; align-items:center; gap:10px; }
      /* Header GitHub icon button */
      header .links a.icon { display:inline-flex; align-items:center; justify-content:center; width:28px; height:28px; color:#cbd5e1; background:#1f2430; border:1px solid #303743; border-radius:4px; text-decoration:none; }
      header .links a.icon:hover { background:#334155; border-color:#475569; color:#e2e8f0; }
      /* Header Help button */
      header .help-btn { background:#334155; color:#e2e8f0; border:1px solid #475569; padding:4px 8px; border-radius:4px; cursor:pointer; font:12px system-ui, sans-serif; }
      header .help-btn:hover { background:#3b4a63; }
      .sr-only { position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px; overflow: hidden; clip: rect(0, 0, 0, 0); white-space: nowrap; border: 0; }
      canvas { display: block; width: 100%; height: 100%; }
      #sidebar {
        position: absolute;
        top: 48px;
        left: 8px;
        bottom: 8px;
        width: 320px;
        overflow: auto;
        background: rgba(18,18,18,0.86);
        color: #ddd;
        padding: 8px 10px;
        border: 1px solid #222;
        border-radius: 6px;
        font-family: system-ui, sans-serif;
      }
      .tabs { display: flex; gap: 6px; margin: 6px 0 8px; }
      .tab-btn { background:#1f2430; color:#cbd5e1; border:1px solid #303743; padding:4px 8px; border-radius:4px; cursor:pointer; font-size:12px; }
      .tab-btn.active { background:#334155; border-color:#475569; color:#e2e8f0; }
      #sidebar h2 { margin: 6px 0 8px; font-size: 14px; color: #cbd5e1; display:flex; align-items:center; gap:6px; }
      .row { display: grid; grid-template-columns: 1fr 60px; gap: 8px; align-items: center; margin: 6px 0; }
      .row.full { grid-template-columns: 1fr; }
      .row label { font-size: 12px; color: #94a3b8; }
      .row input[type="range"] { width: 100%; }
      .row input[type="number"], .row select { width: 60px; background: #0f1115; color: #e2e8f0; border: 1px solid #2a2e37; border-radius: 4px; padding: 2px 4px; }
      .section { margin: 10px 0 14px; padding-bottom: 8px; border-bottom: 1px solid #222; }
      .section:hover { background: rgba(255,255,255,0.02); border-radius: 4px; }
      .section h2 { cursor: pointer; user-select: none; }
      .section h2 .caret { display:inline-block; width: 10px; text-align:center; transform: rotate(0deg); transition: transform 120ms ease; }
      .section.collapsed > :not(h2) { display: none; }
      .section.collapsed h2 .caret { transform: rotate(-90deg); }
      .toolbar { display: flex; gap: 8px; flex-wrap: wrap; margin: 8px 0; }
      .toolbar button { background: #334155; color: #e2e8f0; border: 1px solid #475569; padding: 4px 8px; border-radius: 4px; cursor: pointer; }
      .toolbar button:hover { background: #3b4a63; }
      /* Simple dropdown for export menu */
      .toolbar .dropdown { position: relative; }
      .toolbar .dropdown .menu { position: absolute; left: 0; top: calc(100% + 4px); background:#0f1115; border:1px solid #2a2e37; border-radius:6px; padding:4px; display:none; min-width: 180px; z-index: 10; }
      .toolbar .dropdown .menu button { width:100%; text-align:left; padding:6px 8px; background:#1f2430; border:1px solid #303743; border-radius:4px; margin:2px 0; }
      .toolbar .dropdown .menu button:hover { background:#334155; border-color:#475569; }
      .section h2 button { background:#475569; border:1px solid #64748b; color:#e2e8f0; padding:2px 6px; border-radius:4px; font-size:11px; }
      .section h2 button:hover { background:#516079; }
      /* Grouped control boxes */
      .group { border:1px solid #475569; border-radius:6px; padding:6px 8px; margin:8px 0; background: rgba(148,163,184,0.06); }
      .group > .group-label { font-size:12px; color:#9ca3af; margin-bottom:6px; }
      /* Help icon next to labels */
      .help-icon { display:inline-flex; align-items:center; justify-content:center; width:14px; height:14px; font-size:10px; line-height:14px; border-radius:50%; background:#475569; color:#e2e8f0; margin-left:6px; cursor:help; border:1px solid #64748b; }
      .help-icon:hover { background:#516079; }
      /* HUD (theme + fps) in header */
      #hud { display: flex; gap: 6px; align-items: center; }
      #hud select { background: rgba(0,0,0,0.55); color:#e2e8f0; border:1px solid rgba(255,255,255,0.12); border-radius:4px; font:12px system-ui, sans-serif; padding: 3px 6px; }
      #fps { background: rgba(0,0,0,0.55); color:#c8facc; font: 12px/1.2 system-ui, sans-serif; padding: 4px 6px; border-radius:4px; border:1px solid rgba(255,255,255,0.08); }
   </style>
  </head>
  <body>
    <div id="app">
      <header>
        <div class="brand">
          <img class="logo" src="/swordmaker_logo_256.png" alt="SwordMaker logo" />
          <strong>SwordMaker</strong>
          <span class="tag">· Parametric sword generator and renderer for the web</span>
        </div>
        <div class="right">
          <div id="hud">
            <select id="theme" title="Background Theme">
              <option value="midnight">Midnight</option>
              <option value="slate">Slate</option>
              <option value="steel">Steel</option>
              <option value="warm">Warm Sunset</option>
              <option value="ocean">Deep Ocean</option>
              <option value="forest">Forest</option>
              <option value="sepia">Sepia</option>
              <option value="graphite">Graphite</option>
            </select>
            <div id="fps" aria-live="polite">FPS: --</div>
          </div>
          <button id="btnHeaderHelp" class="help-btn" title="Open Help (Cmd/Ctrl+/ or F1)">Help</button>
          <div class="links">
            <a class="icon" href="https://github.com/patricker/SwordMaker" target="_blank" rel="noopener" aria-label="GitHub repository">
              <svg viewBox="0 0 16 16" width="16" height="16" aria-hidden="true" focusable="false">
                <path fill="currentColor" d="M8 0C3.58 0 0 3.58 0 8a8 8 0 005.47 7.59c.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82a7.54 7.54 0 012 0c1.53-1.03 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.19 0 .21.15.46.55.38A8 8 0 0016 8c0-4.42-3.58-8-8-8z"/>
              </svg>
              <span class="sr-only">GitHub</span>
            </a>
          </div>
        </div>
      </header>
      <div id="sidebar"></div>
      <canvas id="scene"></canvas>
    </div>
    
    <script type="module" src="/src/main.ts"></script>
  </body>
  </html>
